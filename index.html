<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>SUMMIT - Find Your Chapter</title>

  <!-- Mapbox GL JS -->
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.14.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.14.0/mapbox-gl.css" rel="stylesheet" />

  <!-- Geocoder -->
  <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.3/mapbox-gl-geocoder.min.js"></script>
  <link
    href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.3/mapbox-gl-geocoder.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="app">
    <!-- Sidebar / Sheet (same element, different behavior by breakpoint) -->
    <aside id="panel" class="panel" aria-label="Chapter list">
      <!-- Mobile only: drag handle -->
      <div id="sheetHandle" class="sheet-handle" role="button" aria-label="Drag to expand or collapse">
        <div class="grabber"></div>
      </div>

      <header class="panel-header">
        <div class="header-text">
          <h1 class="title">Find Your Chapter</h1>
          <div class="sub">
            <span id="store-count">Chapters: 0</span>
            <span class="sep">•</span>
            <span id="status">Loading…</span>
          </div>
        </div>

        <!-- Mobile only -->
        <button id="collapseBtn" class="collapse-btn" type="button">Collapse</button>
      </header>

      <div class="controls">
        <input
          id="filter"
          class="filter"
          type="search"
          placeholder="Search school / city…"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <div id="listings" class="listings"></div>
    </aside>

    <!-- Map -->
    <div id="map" class="map"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
