<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>SUMMIT - Find Your Chapter</title>

  <!-- Mapbox GL JS -->
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.14.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.14.0/mapbox-gl.css" rel="stylesheet" />

  <!-- Geocoder -->
  <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.3/mapbox-gl-geocoder.min.js"></script>
  <link
    href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.3/mapbox-gl-geocoder.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div id="map" class="map"></div>

  <!-- Bottom sheet / sidebar -->
  <aside id="sheet" class="sheet collapsed" aria-label="Chapter list">
    <button id="sheetToggle" class="sheet-handle" aria-label="Expand chapter list">
      <span class="grabber"></span>
    </button>

    <header class="sheet-header">
      <div class="header-text">
        <h1 class="title">Find Your Chapter</h1>
        <div class="sub">
          <span id="store-count">Chapters: 0</span>
          <span class="sep">•</span>
          <span id="status">Loading…</span>
        </div>
      </div>

      <button id="collapseBtn" class="collapse-btn" type="button" aria-label="Collapse">
        Collapse
      </button>
    </header>

    <div class="controls">
      <input
        id="filter"
        class="filter"
        type="search"
        placeholder="Search school / city…"
        autocomplete="off"
        spellcheck="false"
      />
    </div>

    <div id="listings" class="listings"></div>
  </aside>

  <script src="app.js"></script>
</body>
</html>
